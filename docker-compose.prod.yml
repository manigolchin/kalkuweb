# kalku-website Production Deployment
# Server: 91.98.185.113
# Subdomain: kalku.kalkus.de (Staging während Bauphase)
# Cutover-Plan: später Host-Rule auf kalku.de + www.kalku.de umstellen
#
# Joins existing Traefik network for HTTPS routing.
# NEVER bind a host port — Traefik handles all incoming traffic on 80/443.

services:
  kalku-website:
    container_name: kalku-website
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - kalku_kalku-network
    labels:
      # Minimal label set — proven working with smoke-test on traefik-test container.
      # Traefik will use cloudflare's existing *.kalkus.de wildcard cert (issued for wp-sites).
      - "traefik.enable=true"
      - "traefik.http.routers.kalku-website.entrypoints=websecure"
      - "traefik.http.routers.kalku-website.rule=Host(`kalku.kalkus.de`)"
      - "traefik.http.routers.kalku-website.priority=200"
      - "traefik.http.routers.kalku-website.tls.certresolver=cloudflare"
      - "traefik.http.services.kalku-website.loadbalancer.server.port=80"

  kalku-api:
    container_name: kalku-api
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - kalku_kalku-network
    env_file:
      - ./api/.env
    volumes:
      - ./api/data:/app/data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.kalku-api.entrypoints=websecure"
      - "traefik.http.routers.kalku-api.rule=Host(`kalku.kalkus.de`) && PathPrefix(`/api`)"
      - "traefik.http.routers.kalku-api.priority=300"
      - "traefik.http.routers.kalku-api.tls.certresolver=cloudflare"
      - "traefik.http.services.kalku-api.loadbalancer.server.port=3000"

  # Authenticated panel backend (auth, projects, customer share). Hono + SQLite.
  # Traefik priority 400 > 300 (kalku-api) so /api/panel/* wins.
  kalku-panel-api:
    container_name: kalku-panel-api
    build:
      context: ./panel-api
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_PATH: /app/data/kalku.db
      CORS_ORIGINS: https://kalku.kalkus.de,https://kalku.de,https://www.kalku.de
    env_file:
      - ./panel-api/.env
    volumes:
      - ./panel-api/data:/app/data
    networks:
      - kalku_kalku-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.kalku-panel-api.entrypoints=websecure"
      - "traefik.http.routers.kalku-panel-api.rule=Host(`kalku.kalkus.de`) && PathPrefix(`/api/panel`)"
      - "traefik.http.routers.kalku-panel-api.priority=400"
      - "traefik.http.routers.kalku-panel-api.tls.certresolver=cloudflare"
      - "traefik.http.services.kalku-panel-api.loadbalancer.server.port=3000"

networks:
  kalku_kalku-network:
    external: true
