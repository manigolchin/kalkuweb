server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Compression
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/manifest+json
    application/xml
    application/rss+xml
    image/svg+xml
    font/woff2;

  # Security headers applied to every response (use `always` so they apply
  # to error pages too). nginx does NOT inherit `add_header` directives
  # into a location block that defines its own — so any location below
  # that needs to override one of these must repeat all of them.
  add_header Strict-Transport-Security "max-age=31536000" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

  # Block sourcemaps from being served publicly. Vite builds them with
  # sourcemap: 'hidden' (no //# sourceMappingURL comment in the JS), but
  # the .map files still get copied into the container. Without this
  # block, anyone could fetch /assets/<chunk>.map and reverse the
  # minified JS back to the original TypeScript.
  location ~* \.map$ {
    return 404;
  }

  # Common scanner probes — return real 404 instead of letting them fall
  # through to the SPA shell. The site has nothing for these paths, but
  # responding 200 with index.html confuses security scanners and wastes
  # bandwidth.
  location ~* ^/(\.env|\.git|\.svn|\.DS_Store|wp-admin|wp-login|wp-content|phpmyadmin|administrator|server-status|server-info|admin\.php|xmlrpc\.php|config\.php) {
    access_log off;
    log_not_found off;
    return 404;
  }

  # Cache static assets aggressively (Vite hashes filenames)
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable" always;
    # Re-state security headers so they aren't lost when this location
    # introduces its own add_header.
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    try_files $uri =404;
  }

  # Fonts
  location ~* \.(woff2|woff|ttf|eot)$ {
    expires 1y;
    add_header Cache-Control "public, immutable" always;
    add_header Access-Control-Allow-Origin "*" always;
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
  }

  # Webmanifest content-type override — nginx's default mime.types
  # doesn't include .webmanifest, so without this it would fall back
  # to application/octet-stream and break PWA install on iOS.
  # Done via a location override (not a types{} block) because a local
  # types{} replaces nginx's inherited mime.types entirely.
  location ~* \.webmanifest$ {
    types { } default_type application/manifest+json;
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
  }

  # SPA fallback — must NOT cache index.html
  location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
  }

  # Healthcheck endpoint
  location = /healthz {
    access_log off;
    return 200 "ok\n";
    add_header Content-Type text/plain;
  }

  # Hide nginx version
  server_tokens off;
}
